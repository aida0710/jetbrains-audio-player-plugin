name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'gradle.properties'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: echo "version=$(grep '^pluginVersion=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Write signing files
        run: |
          echo "${{ secrets.CERTIFICATE }}" > chain.crt
          echo "${{ secrets.PRIVATE_KEY }}" > private.pem

      - name: Build and Sign
        env:
          CERTIFICATE_CHAIN: chain.crt
          PRIVATE_KEY: private.pem
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew clean signPlugin

      - name: Clean up signing files
        if: always()
        run: rm -f chain.crt private.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/distributions/*.zip
